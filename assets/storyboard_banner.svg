<svg width="1200" height="280" viewBox="0 0 1200 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ComfyUI Storyboard Banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#1F2937"/>
    </linearGradient>
    <linearGradient id="accent" x1="200" y1="40" x2="980" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1200" height="280" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="280" rx="24" fill="url(#bg)"/>

  <g opacity="0.16">
    <rect x="58" y="58" width="160" height="104" rx="14" stroke="#93C5FD" stroke-width="3"/>
    <rect x="248" y="92" width="180" height="120" rx="14" stroke="#67E8F9" stroke-width="3"/>
    <rect x="462" y="56" width="190" height="132" rx="14" stroke="#93C5FD" stroke-width="3"/>
    <path d="M218 110L248 120" stroke="#60A5FA" stroke-width="3" stroke-linecap="round"/>
    <path d="M428 128L462 120" stroke="#22D3EE" stroke-width="3" stroke-linecap="round"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="720" y="52" width="420" height="176" rx="22" fill="#0B1220" stroke="url(#accent)" stroke-width="2"/>
    <rect x="748" y="82" width="98" height="112" rx="14" fill="#12314A"/>
    <rect x="862" y="82" width="250" height="22" rx="11" fill="#1D4ED8"/>
    <rect x="862" y="116" width="222" height="16" rx="8" fill="#334155"/>
    <rect x="862" y="142" width="188" height="16" rx="8" fill="#334155"/>
    <rect x="862" y="170" width="138" height="16" rx="8" fill="#334155"/>
  </g>

  <text x="84" y="122" fill="#E2E8F0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="54" font-weight="800">ComfyUI Storyboard</text>
  <text x="86" y="166" fill="#93C5FD" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="600">Organize references, direct generations, and design visual narratives.</text>

  <g transform="translate(86 198)">
    <rect width="196" height="38" rx="19" fill="#0F172A" stroke="#38BDF8"/>
    <text x="18" y="25" fill="#67E8F9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">MKR • Storyboard</text>
  </g>
</svg>
